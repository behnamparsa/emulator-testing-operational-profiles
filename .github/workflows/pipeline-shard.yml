name: Pipeline Shard

on:
  workflow_call:
    inputs:
      shard_file:
        required: true
        type: string
      shard_id:
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  run-shard:
    runs-on: ubuntu-latest
    timeout-minutes: 340

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download shard definitions
        uses: actions/download-artifact@v6
        with:
          name: shard-definitions
          path: shard-definitions

      - name: Prepare shard processed folder
        run: |
          mkdir -p "data/processed/shards/${{ inputs.shard_id }}"
          cp "shard-definitions/${{ inputs.shard_file }}" "data/processed/shards/${{ inputs.shard_id }}/URL_List.csv"
          echo "Shard: ${{ inputs.shard_id }}"
          echo "URL_List.csv lines:"
          wc -l "data/processed/shards/${{ inputs.shard_id }}/URL_List.csv" || true

      - name: Debug shard CSV
        run: |
          echo "First lines of shard CSV:"
          sed -n '1,10p' "data/processed/shards/${{ inputs.shard_id }}/URL_List.csv"

      - name: Run Stage 1
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ github.token }}
          ROOT_DIR: ${{ github.workspace }}/data/processed/shards/${{ inputs.shard_id }}
        run: |
          python -m pipeline.stage1_verified_workflows

      - name: Check Stage 1 outputs
        if: always()
        run: |
          echo "Stage 1 output line count:"
          wc -l "data/processed/shards/${{ inputs.shard_id }}/verified_workflows_v16.csv" || true
          echo "First lines of Stage 1 output:"
          sed -n '1,10p' "data/processed/shards/${{ inputs.shard_id }}/verified_workflows_v16.csv" || true

      - name: Run Stage 2
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ github.token }}
          ROOT_DIR: ${{ github.workspace }}/data/processed/shards/${{ inputs.shard_id }}
        run: |
          python -m pipeline.stage2_run_inventory

      - name: Check Stage 2 outputs
        if: always()
        run: |
          echo "Stage 2 run_inventory.csv line count:"
          wc -l "data/processed/shards/${{ inputs.shard_id }}/run_inventory.csv" || true
          echo "Stage 2 run_inventory_per_style.csv line count:"
          wc -l "data/processed/shards/${{ inputs.shard_id }}/run_inventory_per_style.csv" || true
          echo "First lines of run_inventory.csv:"
          sed -n '1,10p' "data/processed/shards/${{ inputs.shard_id }}/run_inventory.csv" || true
          echo "First lines of run_inventory_per_style.csv:"
          sed -n '1,10p' "data/processed/shards/${{ inputs.shard_id }}/run_inventory_per_style.csv" || true

      - name: Run Stage 3
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ github.token }}
          ROOT_DIR: ${{ github.workspace }}/data/processed/shards/${{ inputs.shard_id }}
        run: |
          python -m pipeline.stage3_run_telemetry

      - name: Check Stage 3 outputs
        if: always()
        run: |
          echo "Stage 3 run_metrics_v16_stage3_enhanced.csv line count:"
          wc -l "data/processed/shards/${{ inputs.shard_id }}/run_metrics_v16_stage3_enhanced.csv" || true
          echo "Stage 3 run_steps_v16_stage3_breakdown.csv line count:"
          wc -l "data/processed/shards/${{ inputs.shard_id }}/run_steps_v16_stage3_breakdown.csv" || true
          echo "Stage 3 run_per_style_v1_stage3.csv line count:"
          wc -l "data/processed/shards/${{ inputs.shard_id }}/run_per_style_v1_stage3.csv" || true
          echo "First lines of run_metrics_v16_stage3_enhanced.csv:"
          sed -n '1,10p' "data/processed/shards/${{ inputs.shard_id }}/run_metrics_v16_stage3_enhanced.csv" || true
          echo "First lines of run_per_style_v1_stage3.csv:"
          sed -n '1,10p' "data/processed/shards/${{ inputs.shard_id }}/run_per_style_v1_stage3.csv" || true

      - name: Run Stage 4
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ github.token }}
          ROOT_DIR: ${{ github.workspace }}/data/processed/shards/${{ inputs.shard_id }}
        run: |
          python -m pipeline.stage4_workload_signature

      - name: Check Stage 4 outputs
        if: always()
        run: |
          echo "Stage 4 run_workload_signature_v3.csv line count:"
          wc -l "data/processed/shards/${{ inputs.shard_id }}/run_workload_signature_v3.csv" || true
          echo "First lines of run_workload_signature_v3.csv:"
          sed -n '1,10p' "data/processed/shards/${{ inputs.shard_id }}/run_workload_signature_v3.csv" || true

      - name: Save shard manifest
        run: |
          cat > "data/processed/shards/${{ inputs.shard_id }}/manifest.json" <<EOF
          {
            "shard_id": "${{ inputs.shard_id }}",
            "shard_file": "${{ inputs.shard_file }}",
            "status": "completed"
          }
          EOF

      - name: Upload shard outputs
        uses: actions/upload-artifact@v6
        with:
          name: shard-${{ inputs.shard_id }}
          path: |
            data/processed/shards/${{ inputs.shard_id }}/verified_workflows_v16.csv
            data/processed/shards/${{ inputs.shard_id }}/run_inventory.csv
            data/processed/shards/${{ inputs.shard_id }}/run_inventory_per_style.csv
            data/processed/shards/${{ inputs.shard_id }}/run_metrics_v16_stage3_enhanced.csv
            data/processed/shards/${{ inputs.shard_id }}/run_steps_v16_stage3_breakdown.csv
            data/processed/shards/${{ inputs.shard_id }}/run_per_style_v1_stage3.csv
            data/processed/shards/${{ inputs.shard_id }}/run_workload_signature_v3.csv
            data/processed/shards/${{ inputs.shard_id }}/manifest.json