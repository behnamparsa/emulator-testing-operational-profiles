name: 3_13_robustness_check

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  robustness:
    runs-on: ubuntu-latest
    concurrency:
      group: data-processed-writer
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scipy

      - name: Run robustness check regeneration
        run: |
          PYTHONPATH=. python scripts/run_robustness_check.py

      - name: Commit robustness outputs
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            outputs/robustness_check/robustness_summary.md \
            outputs/robustness_check/signature_inventory.csv \
            outputs/robustness_check/coarsened_family_inventory.csv \
            outputs/robustness_check/observation_robustness_check.csv

          if git diff --cached --quiet; then
            echo "No robustness-output changes to commit."
            exit 0
          fi

          git commit -m "Regenerate robustness check outputs"

          pushed=0
          for i in 1 2 3; do
            echo "Push attempt ${i}"
            if git pull --rebase origin main && git push origin HEAD:main; then
              pushed=1
              break
            fi
            echo "Push attempt ${i} failed; retrying after 10s..."
            sleep 10
          done

          test "${pushed}" = "1"
