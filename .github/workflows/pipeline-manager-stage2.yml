name: Pipeline Manager Stage 2

on:
  workflow_dispatch:
    inputs:
      chunk_size:
        description: Verified-workflow rows per Stage 2 shard
        required: false
        default: '10'
      max_parallel:
        description: Max parallel Stage 2 shards
        required: false
        default: '3'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: read

jobs:
  prepare-stage2-shards:
    runs-on: ubuntu-latest
    outputs:
      shard_matrix: ${{ steps.build.outputs.shard_matrix }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Prepare stage 2 shards
        run: |
          mkdir -p data/processed/stage2_shards
          test -f data/processed/verified_workflows_v16.csv
          python scripts/split_csv_rows.py             --input data/processed/verified_workflows_v16.csv             --output-root data/processed/stage2_shards             --base-name verified_workflows_v16.csv             --chunk-size "${{ inputs.chunk_size }}"
      - name: Upload stage 2 shard definitions
        uses: actions/upload-artifact@v6
        with:
          name: stage2-shard-definitions
          path: data/processed/stage2_shards
      - id: build
        name: Build shard matrix
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          root = Path('data/processed/stage2_shards')
          shards = sorted([p.name for p in root.iterdir() if p.is_dir()])
          matrix = {'include': [{'shard_id': s} for s in shards]}
          with open('${GITHUB_OUTPUT}', 'a', encoding='utf-8') as fh:
              fh.write(f"shard_matrix={json.dumps(matrix)}\n")
          print(matrix)
          PY

  run-stage2-shards:
    needs: prepare-stage2-shards
    if: ${{ fromJson(needs.prepare-stage2-shards.outputs.shard_matrix).include[0] != null }}
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJson(inputs.max_parallel) }}
      matrix: ${{ fromJson(needs.prepare-stage2-shards.outputs.shard_matrix) }}
    uses: ./.github/workflows/stage2-shard.yml
    with:
      shard_id: ${{ matrix.shard_id }}

  aggregate-stage2:
    needs: run-stage2-shards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Download stage 2 shard outputs
        uses: actions/download-artifact@v6
        with:
          pattern: stage2-*
          path: data/processed/stage2_shards_downloaded
          merge-multiple: false
      - name: Aggregate Stage 2
        run: |
          mkdir -p data/processed
          python scripts/aggregate_selected_results.py             --input-root data/processed/stage2_shards_downloaded             --output-root data/processed             --files run_inventory.csv run_inventory_per_style.csv
          echo 'Stage 2 merged run_inventory rows:'
          wc -l data/processed/run_inventory.csv || true
          echo 'Stage 2 merged run_inventory_per_style rows:'
          wc -l data/processed/run_inventory_per_style.csv || true
      - name: Commit Stage 2 outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed/run_inventory.csv data/processed/run_inventory_per_style.csv
          git diff --cached --quiet || git commit -m "Stage 2 manager: run inventory outputs"
          git push
      - name: Upload Stage 2 artifact
        uses: actions/upload-artifact@v6
        with:
          name: stage2
          path: |
            data/processed/run_inventory.csv
            data/processed/run_inventory_per_style.csv
