name: Pipeline Manager

on:
  workflow_dispatch:
    inputs:
      chunk_size:
        description: URLs per shard
        required: false
        default: '10'
      max_parallel:
        description: Max shard pipelines in parallel
        required: false
        default: '3'
      url_list_path:
        description: Path to master URL list CSV
        required: false
        default: 'data/processed/URL_List.csv'

permissions:
  contents: write
  actions: read
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare-shards:
    runs-on: ubuntu-latest
    outputs:
      shard_matrix: ${{ steps.build.outputs.shard_matrix }}
      shard_count: ${{ steps.build.outputs.shard_count }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Validate URL list exists
        run: |
          test -f "${{ github.event.inputs.url_list_path || 'data/processed/URL_List.csv' }}"

      - name: Build shard files and matrix
        id: build
        run: |
          python scripts/split_url_list.py \
            --input "${{ github.event.inputs.url_list_path || 'data/processed/URL_List.csv' }}" \
            --chunk-size "${{ github.event.inputs.chunk_size || '10' }}" \
            --out-dir shards

          python - <<'PY'
          import json, os
          from pathlib import Path
          shard_dir = Path('shards')
          shard_files = sorted([p.name for p in shard_dir.glob('shard_*.csv')])
          matrix = [{"shard_file": name, "shard_id": name[:-4]} for name in shard_files]
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as out:
              out.write(f"shard_matrix={json.dumps(matrix)}\n")
              out.write(f"shard_count={len(matrix)}\n")
          print(json.dumps(matrix, indent=2))
          PY

      - name: Upload shard definitions
        uses: actions/upload-artifact@v6
        with:
          name: shard-definitions
          path: shards/

  run-shards:
    needs: prepare-shards
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(github.event.inputs.max_parallel || '3') }}
      matrix:
        include: ${{ fromJSON(needs.prepare-shards.outputs.shard_matrix) }}
    uses: ./.github/workflows/pipeline-shard.yml
    with:
      shard_file: ${{ matrix.shard_file }}
      shard_id: ${{ matrix.shard_id }}
    secrets: inherit

  aggregate:
    needs: run-shards
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare processed folder
        run: |
          mkdir -p data/processed

      - name: Download shard artifacts
        uses: actions/download-artifact@v6
        with:
          path: downloaded_artifacts
          pattern: shard-*
          merge-multiple: false

      - name: Aggregate shard CSVs into processed folder
        run: |
          python scripts/aggregate_results.py \
            --input-dir downloaded_artifacts \
            --output-dir data/processed

      - name: Debug aggregated outputs
        run: |
          echo "=== data/processed ==="
          find data/processed -maxdepth 2 -type f | sort || true
          echo "=== aggregate manifest ==="
          cat data/processed/aggregate_manifest.json || true


      - name: Validate aggregated outputs exist
        run: |
          test -f data/processed/verified_workflows_v16.csv
          test -f data/processed/run_inventory.csv
          test -f data/processed/run_metrics_v16_stage3_enhanced.csv
          test -f data/processed/run_steps_v16_stage3_breakdown.csv
          test -f data/processed/run_per_style_v1_stage3.csv
          test -f data/processed/run_workload_signature_v3.csv

      - name: Build final MainDataset
        env:
          ROOT_DIR: ${{ github.workspace }}/data/processed
        run: |
          python -m pipeline.build_total_dataset

      - name: Validate final MainDataset exists
        run: |
          test -f data/processed/MainDataset.csv

      - name: Commit merged processed outputs
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            data/processed/verified_workflows_v16.csv \
            data/processed/run_inventory.csv \
            data/processed/run_metrics_v16_stage3_enhanced.csv \
            data/processed/run_steps_v16_stage3_breakdown.csv \
            data/processed/run_per_style_v1_stage3.csv \
            data/processed/run_workload_signature_v3.csv \
            data/processed/MainDataset.csv
          git diff --cached --quiet || git commit -m "Update sharded processed pipeline outputs"
          git push

      - name: Upload aggregated outputs
        uses: actions/upload-artifact@v6
        with:
          name: final-aggregated-results
          path: |
            data/processed/MainDataset.csv
            data/processed/verified_workflows_v16.csv
            data/processed/run_inventory.csv
            data/processed/run_metrics_v16_stage3_enhanced.csv
            data/processed/run_steps_v16_stage3_breakdown.csv
            data/processed/run_per_style_v1_stage3.csv
            data/processed/run_workload_signature_v3.csv
            data/processed/aggregate_manifest.json