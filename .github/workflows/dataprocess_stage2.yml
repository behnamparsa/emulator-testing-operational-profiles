name: DataProcess Stage 2 - Run Inventory

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  stage2:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Stage 1 output exists
        run: |
          test -f data/study_exports/verified_workflows_v16.csv

      - name: Prepare workdir + copy Stage 1 output
        run: |
          mkdir -p workdir
          cp data/study_exports/verified_workflows_v16.csv workdir/verified_workflows_v16.csv

      - name: Run Stage 2 (run inventory)
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ github.token }}
          ROOT_DIR: ${{ github.workspace }}/workdir
        run: |
          python -m pipeline.stage2_run_inventory

      - name: Persist Stage 2 output into repo
        run: |
          mkdir -p data/study_exports
          cp workdir/run_inventory.csv data/study_exports/run_inventory.csv

      - name: Commit Stage 2 output
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/study_exports/run_inventory.csv
          git diff --cached --quiet || git commit -m "Stage 2: run_inventory.csv"
          git push

      - name: Upload Stage 2 artifact
        uses: actions/upload-artifact@v4
        with:
          name: stage2_run_inventory
          path: data/study_exports/run_inventory.csv