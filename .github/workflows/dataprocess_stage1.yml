name: DataProcess Stage 1 - Verified Workflows

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 9 * * 1'  # optional later

permissions:
  contents: write

jobs:
  stage1:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate URL list exists
        run: |
          test -f data/processed/URL_List.csv

      - name: Prepare workdir + copy URL list
        run: |
          mkdir -p workdir
          cp data/processed/URL_List.csv workdir/URL_List.csv

      - name: Run Stage 1 (verified workflows)
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ github.token }}
          ROOT_DIR: ${{ github.workspace }}/workdir
        run: |
          python -m pipeline.stage1_verified_workflows

      - name: Persist Stage 1 output into repo
        run: |
          mkdir -p data/study_exports
          cp workdir/verified_workflows_v16.csv data/study_exports/verified_workflows_v16.csv

      - name: Commit Stage 1 output
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/study_exports/verified_workflows_v16.csv
          git diff --cached --quiet || git commit -m "Stage 1: verified_workflows_v16.csv"
          git push

      - name: Upload Stage 1 artifact
        uses: actions/upload-artifact@v4
        with:
          name: stage1_verified_workflows
          path: data/study_exports/verified_workflows_v16.csv