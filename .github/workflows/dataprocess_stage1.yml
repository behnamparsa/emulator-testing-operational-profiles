name: DataProcess Stage 1 - Verified Workflows

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 9 * * 1'  # optional later

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  stage1:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare processed folder
        run: |
          mkdir -p data/processed

      - name: Validate URL list exists
        run: |
          test -f data/processed/URL_List.csv

      - name: Run Stage 1 (verified workflows)
        env:
          GH_PAT_1: ${{ secrets.GH_PAT_1 }}
          GH_PAT_2: ${{ secrets.GH_PAT_2 }}
          GH_PAT_3: ${{ secrets.GH_PAT_3 }}
          GH_PAT_4: ${{ secrets.GH_PAT_4 }}
          GH_PAT_5: ${{ secrets.GH_PAT_5 }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ github.token }}
          ROOT_DIR: ${{ github.workspace }}/data/processed
        run: |
          python -m pipeline.stage1_verified_workflows

      - name: Validate Stage 1 output exists
        run: |
          test -f data/processed/verified_workflows_v16.csv

      - name: Commit Stage 1 output
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed/verified_workflows_v16.csv
          git diff --cached --quiet || git commit -m "Stage 1: verified_workflows_v16.csv"
          git push

      - name: Upload Stage 1 artifact
        uses: actions/upload-artifact@v6
        with:
          name: stage1_verified_workflows
          path: data/processed/verified_workflows_v16.csv
