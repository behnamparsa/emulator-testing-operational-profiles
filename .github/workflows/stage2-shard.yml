name: Stage 2 Shard

on:
  workflow_call:
    inputs:
      shard_id:
        required: true
        type: string
      shard_root:
        required: false
        type: string
        default: data/processed/stage2_shards

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  run-shard:
    runs-on: ubuntu-latest
    timeout-minutes: 220
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download stage 2 shard definitions
        uses: actions/download-artifact@v6
        with:
          name: stage2-shard-definitions
          path: stage2-shard-definitions

      - name: Prepare stage 2 shard root
        run: |
          mkdir -p "${{ inputs.shard_root }}/${{ inputs.shard_id }}"
          cp "stage2-shard-definitions/${{ inputs.shard_id }}/verified_workflows_v16.csv" "${{ inputs.shard_root }}/${{ inputs.shard_id }}/verified_workflows_v16.csv"
          echo "Stage 2 shard input lines:"
          wc -l "${{ inputs.shard_root }}/${{ inputs.shard_id }}/verified_workflows_v16.csv" || true

      - name: Run Stage 2
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ github.token }}
          GH_PAT_1: ${{ secrets.GH_PAT_1 }}
          GH_PAT_2: ${{ secrets.GH_PAT_2 }}
          GH_PAT_3: ${{ secrets.GH_PAT_3 }}
          GH_PAT_4: ${{ secrets.GH_PAT_4 }}
          GH_PAT_5: ${{ secrets.GH_PAT_5 }}
          ROOT_DIR: ${{ github.workspace }}/${{ inputs.shard_root }}/${{ inputs.shard_id }}
        run: python -m pipeline.stage2_run_inventory

      - name: Check Stage 2 outputs
        if: always()
        run: |
          echo "run_inventory.csv lines:"
          wc -l "${{ inputs.shard_root }}/${{ inputs.shard_id }}/run_inventory.csv" || true
          echo "run_inventory_per_style.csv lines:"
          wc -l "${{ inputs.shard_root }}/${{ inputs.shard_id }}/run_inventory_per_style.csv" || true

      - name: Upload Stage 2 shard outputs
        uses: actions/upload-artifact@v6
        with:
          name: stage2-${{ inputs.shard_id }}
          path: |
            ${{ inputs.shard_root }}/${{ inputs.shard_id }}/run_inventory.csv
            ${{ inputs.shard_root }}/${{ inputs.shard_id }}/run_inventory_per_style.csv
