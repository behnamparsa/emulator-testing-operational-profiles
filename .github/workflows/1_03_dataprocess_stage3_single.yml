name: Stage 3 - Single-Run Telemetry Extraction

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  stage3:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare processed folder
        run: |
          mkdir -p data/processed

      - name: Validate Stage 2 outputs exist
        run: |
          test -f data/processed/run_inventory.csv
          test -f data/processed/run_inventory_per_style.csv

      - name: Run Stage 3
        env:
          GH_PAT_1: ${{ secrets.GH_PAT_1 }}
          GH_PAT_2: ${{ secrets.GH_PAT_2 }}
          GH_PAT_3: ${{ secrets.GH_PAT_3 }}
          GH_PAT_4: ${{ secrets.GH_PAT_4 }}
          GH_PAT_5: ${{ secrets.GH_PAT_5 }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ github.token }}
          ROOT_DIR: ${{ github.workspace }}/data/processed
        run: |
          python -m pipeline.stage3_run_telemetry

      - name: Inspect Stage 3 outputs
        if: always()
        run: |
          echo "run_metrics lines:"
          wc -l data/processed/run_metrics_v16_stage3_enhanced.csv || true
          echo "run_steps lines:"
          wc -l data/processed/run_steps_v16_stage3_breakdown.csv || true
          echo "run_per_style lines:"
          wc -l data/processed/run_per_style_v1_stage3.csv || true
          echo "run_metrics preview:"
          sed -n '1,10p' data/processed/run_metrics_v16_stage3_enhanced.csv || true
          echo "run_steps preview:"
          sed -n '1,10p' data/processed/run_steps_v16_stage3_breakdown.csv || true
          echo "run_per_style preview:"
          sed -n '1,10p' data/processed/run_per_style_v1_stage3.csv || true

      - name: Validate Stage 3 outputs exist
        run: |
          test -f data/processed/run_metrics_v16_stage3_enhanced.csv
          test -f data/processed/run_steps_v16_stage3_breakdown.csv
          test -f data/processed/run_per_style_v1_stage3.csv

      - name: Commit Stage 3 outputs
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed/run_metrics_v16_stage3_enhanced.csv \
                  data/processed/run_steps_v16_stage3_breakdown.csv \
                  data/processed/run_per_style_v1_stage3.csv
          git diff --cached --quiet || git commit -m "Stage 3: telemetry + steps + per-style CSVs"
          git push

      - name: Upload Stage 3 artifact
        uses: actions/upload-artifact@v7
        with:
          name: stage3
          path: |
            data/processed/run_metrics_v16_stage3_enhanced.csv
            data/processed/run_steps_v16_stage3_breakdown.csv
            data/processed/run_per_style_v1_stage3.csv