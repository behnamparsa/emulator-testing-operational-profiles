name: Stage 4 - Single-Run Signature Construction

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: read

jobs:
  stage4:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare processed folder
        run: |
          mkdir -p data/processed
          mkdir -p data/processed/stage3_artifact_download

      - name: Download latest Stage 3 artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run download \
            --repo "${{ github.repository }}" \
            --name stage3 \
            --dir data/processed/stage3_artifact_download

      - name: Restore Stage 3 step telemetry from artifact
        run: |
          test -f data/processed/stage3_artifact_download/run_steps_v16_stage3_breakdown.zip
          cp data/processed/stage3_artifact_download/run_steps_v16_stage3_breakdown.zip \
             data/processed/run_steps_v16_stage3_breakdown.zip

          python - <<'PY'
          import zipfile
          from pathlib import Path

          zip_path = Path("data/processed/run_steps_v16_stage3_breakdown.zip")
          out_dir = Path("data/processed")

          with zipfile.ZipFile(zip_path, "r") as zf:
              zf.extractall(out_dir)

          csv_path = out_dir / "run_steps_v16_stage3_breakdown.csv"
          if not csv_path.exists():
              raise RuntimeError("run_steps_v16_stage3_breakdown.csv was not extracted from Stage 3 artifact")

          print(csv_path)
          PY

      - name: Validate Stage 3 inputs exist
        run: |
          ls -lah data/processed || true
          test -f data/processed/run_metrics_v16_stage3_enhanced.csv
          test -f data/processed/run_steps_v16_stage3_breakdown.csv

      - name: Run Stage 4
        env:
          GH_PAT_1: ${{ secrets.GH_PAT_1 }}
          GH_PAT_2: ${{ secrets.GH_PAT_2 }}
          GH_PAT_3: ${{ secrets.GH_PAT_3 }}
          GH_PAT_4: ${{ secrets.GH_PAT_4 }}
          GH_PAT_5: ${{ secrets.GH_PAT_5 }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ github.token }}
          ROOT_DIR: ${{ github.workspace }}/data/processed
        run: |
          python -m pipeline.stage4_workload_signature

      - name: Inspect Stage 4 output
        if: always()
        run: |
          echo "run_workload_signature_v3.csv lines:"
          wc -l data/processed/run_workload_signature_v3.csv || true
          echo "run_workload_signature_v3.csv preview:"
          sed -n '1,10p' data/processed/run_workload_signature_v3.csv || true

      - name: Validate Stage 4 output exists
        run: |
          test -f data/processed/run_workload_signature_v3.csv

      - name: Commit Stage 4 output
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed/run_workload_signature_v3.csv
          git diff --cached --quiet || git commit -m "Stage 4: run_workload_signature_v3.csv"
          git push

      - name: Upload Stage 4 artifact
        uses: actions/upload-artifact@v7
        with:
          name: stage4
          path: data/processed/run_workload_signature_v3.csv