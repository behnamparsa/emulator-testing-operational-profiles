name: DataProcess Stage 4 - Signature + Build MainDataset

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  stage4:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Stage 3 outputs exist
        run: |
          test -f data/study_exports/run_metrics_v16_stage3_enhanced.csv
          test -f data/study_exports/run_steps_v16_stage3_breakdown.csv
          test -f data/study_exports/run_per_style_v1_stage3.csv

      - name: Prepare workdir + copy Stage 3 outputs
        run: |
          mkdir -p workdir
          cp data/study_exports/run_metrics_v16_stage3_enhanced.csv workdir/run_metrics_v16_stage3_enhanced.csv
          cp data/study_exports/run_steps_v16_stage3_breakdown.csv workdir/run_steps_v16_stage3_breakdown.csv
          cp data/study_exports/run_per_style_v1_stage3.csv workdir/run_per_style_v1_stage3.csv

      - name: Run Stage 4 + build dataset
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ github.token }}
          ROOT_DIR: ${{ github.workspace }}/workdir
        run: |
          python -m pipeline.stage4_workload_signature
          python -m pipeline.build_total_dataset

      - name: Persist MainDataset into repo (study_exports + processed)
        run: |
          mkdir -p data/study_exports
          mkdir -p data/processed
          cp workdir/MainDataset.csv data/study_exports/MainDataset.csv
          cp workdir/MainDataset.csv data/processed/MainDataset.csv

      - name: Commit Stage 4 outputs (MainDataset)
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/study_exports/MainDataset.csv data/processed/MainDataset.csv
          git diff --cached --quiet || git commit -m "Stage 4: MainDataset.csv"
          git push

      - name: Upload MainDataset artifact
        uses: actions/upload-artifact@v4
        with:
          name: stage4_maindataset
          path: |
            data/study_exports/MainDataset.csv
            data/processed/MainDataset.csv