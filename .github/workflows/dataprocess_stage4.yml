name: DataProcess Stage 4 - Signature Only

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  stage4:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Stage 3 inputs exist (signature inputs)
        run: |
          test -f data/study_exports/run_metrics_v16_stage3_enhanced.csv
          test -f data/study_exports/run_steps_v16_stage3_breakdown.csv

      - name: Prepare workdir + copy Stage 3 inputs
        run: |
          mkdir -p workdir
          cp data/study_exports/run_metrics_v16_stage3_enhanced.csv workdir/run_metrics_v16_stage3_enhanced.csv
          cp data/study_exports/run_steps_v16_stage3_breakdown.csv workdir/run_steps_v16_stage3_breakdown.csv

      - name: Run Stage 4 (signature only)
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ github.token }}
          ROOT_DIR: ${{ github.workspace }}/workdir
        run: |
          python -m pipeline.stage4_workload_signature

      - name: Persist signature CSV into repo (study_exports)
        run: |
          mkdir -p data/study_exports
          cp workdir/run_workload_signature_v3.csv data/study_exports/run_workload_signature_v3.csv

      - name: Commit Stage 4 output (signature)
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/study_exports/run_workload_signature_v3.csv
          git diff --cached --quiet || git commit -m "Stage 4: run_workload_signature_v3.csv"
          git push

      - name: Upload signature artifact
        uses: actions/upload-artifact@v4
        with:
          name: stage4_signature
          path: data/study_exports/run_workload_signature_v3.csv