name: Pipeline Manager Stage 4

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  run-stage4:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Validate Stage 3 merged inputs exist
        run: |
          test -f data/processed/run_metrics_v16_stage3_enhanced.csv
          test -f data/processed/run_steps_v16_stage3_breakdown.csv
          test -f data/processed/run_per_style_v1_stage3.csv
      - name: Run Stage 4
        env:
          GH_PAT_1: ${{ secrets.GH_PAT_1 }}
          GH_PAT_2: ${{ secrets.GH_PAT_2 }}
          GH_PAT_3: ${{ secrets.GH_PAT_3 }}
          GH_PAT_4: ${{ secrets.GH_PAT_4 }}
          GH_PAT_5: ${{ secrets.GH_PAT_5 }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ github.token }}
          ROOT_DIR: ${{ github.workspace }}/data/processed
        run: |
          python -m pipeline.stage4_workload_signature
          echo 'Stage 4 merged rows:'
          wc -l data/processed/run_workload_signature_v3.csv || true
      - name: Commit Stage 4 output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed/run_workload_signature_v3.csv
          git diff --cached --quiet || git commit -m "Stage 4 manager: signature output"
          git push
      - name: Upload Stage 4 artifact
        uses: actions/upload-artifact@v6
        with:
          name: stage4
          path: data/processed/run_workload_signature_v3.csv
