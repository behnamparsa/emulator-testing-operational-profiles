name: Layer 2 Answer Refresh

on:
  workflow_dispatch:
    inputs:
      snapshot_tag:
        description: Optional snapshot tag override
        required: false
        default: ''
        type: string

  workflow_call:
    inputs:
      snapshot_tag:
        required: false
        default: ''
        type: string

permissions:
  contents: write

concurrency:
  group: data-processed-writer
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Sync latest main after Layer 1
        run: |
          git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Layer 2 refresh
        env:
          SNAPSHOT_TAG: ${{ inputs.snapshot_tag }}
        run: |
          PYTHONPATH=. python scripts/run_layer2_refresh.py

      - name: Commit Layer 2 output
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add outputs/catalog/observation_qa_catalog_refreshed.csv

          if git diff --cached --quiet; then
            echo "No refresh-output changes to commit."
            exit 0
          fi

          git commit -m "Layer 2 answer refresh"

          pushed=0
          for i in 1 2 3; do
            echo "Push attempt ${i}"
            if git pull --rebase origin main && git push origin HEAD:main; then
              pushed=1
              break
            fi
            echo "Push attempt ${i} failed; retrying after 10s..."
            sleep 10
          done

          test "${pushed}" = "1"