name: Layer 2 Answer Refresh
on:
  workflow_dispatch:
    inputs:
      snapshot_tag:
        required: false
        default: ''
permissions:
  contents: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Layer 2 refresh
        env:
          SNAPSHOT_TAG: ${{ inputs.snapshot_tag }}
        run: python scripts/run_layer2_refresh.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/catalog/observation_qa_catalog_refreshed.csv
          git diff --cached --quiet || git commit -m "Layer 2 answer refresh"
          git pull --rebase origin main || true
          git push origin HEAD:main || true
