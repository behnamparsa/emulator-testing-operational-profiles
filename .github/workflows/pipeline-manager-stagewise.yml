name: Pipeline Manager Stagewise

on:
  workflow_dispatch:
    inputs:
      stage1_chunk_size:
        description: URLs per Stage 1 shard
        required: false
        default: '10'
      stage2_chunk_size:
        description: Verified-workflow rows per Stage 2 shard
        required: false
        default: '10'
      stage3_chunk_size:
        description: Per-style inventory rows per Stage 3 shard
        required: false
        default: '10'
      max_parallel:
        description: Max parallel shards per stage
        required: false
        default: '3'
      url_list_path:
        description: Path to master URL list CSV
        required: false
        default: 'data/processed/URL_List.csv'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: read

jobs:
  prepare-stage1-shards:
    runs-on: ubuntu-latest
    outputs:
      shard_matrix: ${{ steps.build.outputs.shard_matrix }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Validate URL list exists
        run: test -f "${{ github.event.inputs.url_list_path || 'data/processed/URL_List.csv' }}"
      - name: Build Stage 1 shard files
        id: build
        run: |
          python scripts/split_csv_rows.py \
            --input "${{ github.event.inputs.url_list_path || 'data/processed/URL_List.csv' }}" \
            --chunk-size "${{ github.event.inputs.stage1_chunk_size || '10' }}" \
            --out-dir stage1_shards \
            --filename URL_List.csv
          python - <<'PY'
          import json, os
          from pathlib import Path
          shard_dir = Path('stage1_shards')
          matrix = [{'shard_id': p.name} for p in sorted(shard_dir.glob('shard_*')) if p.is_dir()]
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as out:
              out.write(f"shard_matrix={json.dumps(matrix)}\n")
          print(json.dumps(matrix, indent=2))
          PY
      - uses: actions/upload-artifact@v6
        with:
          name: stage1-shard-definitions
          path: stage1_shards/

  run-stage1-shards:
    needs: prepare-stage1-shards
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(github.event.inputs.max_parallel || '3') }}
      matrix:
        include: ${{ fromJSON(needs.prepare-stage1-shards.outputs.shard_matrix) }}
    uses: ./.github/workflows/stage1-shard.yml
    with:
      shard_id: ${{ matrix.shard_id }}
    secrets: inherit

  aggregate-stage1:
    needs: run-stage1-shards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: mkdir -p data/processed
      - uses: actions/download-artifact@v6
        with:
          path: downloaded_stage1
          pattern: stage1-*
          merge-multiple: false
      - name: Aggregate Stage 1 outputs
        run: |
          python scripts/aggregate_selected_results.py \
            --input-dir downloaded_stage1 \
            --output-dir data/processed \
            --file verified_workflows_v16.csv
          wc -l data/processed/verified_workflows_v16.csv || true
      - uses: actions/upload-artifact@v6
        with:
          name: stage1-merged
          path: |
            data/processed/verified_workflows_v16.csv
            data/processed/aggregate_manifest.json

  prepare-stage2-shards:
    needs: aggregate-stage1
    runs-on: ubuntu-latest
    outputs:
      shard_matrix: ${{ steps.build.outputs.shard_matrix }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - uses: actions/download-artifact@v6
        with:
          name: stage1-merged
          path: data/processed
      - name: Build Stage 2 shard files
        id: build
        run: |
          python scripts/split_csv_rows.py \
            --input data/processed/verified_workflows_v16.csv \
            --chunk-size "${{ github.event.inputs.stage2_chunk_size || '10' }}" \
            --out-dir stage2_shards \
            --filename verified_workflows_v16.csv
          python - <<'PY'
          import json, os
          from pathlib import Path
          shard_dir = Path('stage2_shards')
          matrix = [{'shard_id': p.name} for p in sorted(shard_dir.glob('shard_*')) if p.is_dir()]
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as out:
              out.write(f"shard_matrix={json.dumps(matrix)}\n")
          print(json.dumps(matrix, indent=2))
          PY
      - uses: actions/upload-artifact@v6
        with:
          name: stage2-shard-definitions
          path: stage2_shards/

  run-stage2-shards:
    needs: prepare-stage2-shards
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(github.event.inputs.max_parallel || '3') }}
      matrix:
        include: ${{ fromJSON(needs.prepare-stage2-shards.outputs.shard_matrix) }}
    uses: ./.github/workflows/stage2-shard.yml
    with:
      shard_id: ${{ matrix.shard_id }}
    secrets: inherit

  aggregate-stage2:
    needs: run-stage2-shards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: mkdir -p data/processed
      - uses: actions/download-artifact@v6
        with:
          name: stage1-merged
          path: data/processed
      - uses: actions/download-artifact@v6
        with:
          path: downloaded_stage2
          pattern: stage2-*
          merge-multiple: false
      - name: Aggregate Stage 2 outputs
        run: |
          python scripts/aggregate_selected_results.py \
            --input-dir downloaded_stage2 \
            --output-dir data/processed \
            --file run_inventory.csv \
            --file run_inventory_per_style.csv
          wc -l data/processed/run_inventory.csv || true
          wc -l data/processed/run_inventory_per_style.csv || true
      - uses: actions/upload-artifact@v6
        with:
          name: stage2-merged
          path: |
            data/processed/verified_workflows_v16.csv
            data/processed/run_inventory.csv
            data/processed/run_inventory_per_style.csv
            data/processed/aggregate_manifest.json

  prepare-stage3-shards:
    needs: aggregate-stage2
    runs-on: ubuntu-latest
    outputs:
      shard_matrix: ${{ steps.build.outputs.shard_matrix }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - uses: actions/download-artifact@v6
        with:
          name: stage2-merged
          path: data/processed
      - name: Build Stage 3 shard files
        id: build
        run: |
          python scripts/prepare_stage3_shards.py \
            --run-inventory data/processed/run_inventory.csv \
            --run-per-style data/processed/run_inventory_per_style.csv \
            --chunk-size "${{ github.event.inputs.stage3_chunk_size || '10' }}" \
            --out-dir stage3_shards
          python - <<'PY'
          import json, os
          from pathlib import Path
          shard_dir = Path('stage3_shards')
          matrix = [{'shard_id': p.name} for p in sorted(shard_dir.glob('shard_*')) if p.is_dir()]
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as out:
              out.write(f"shard_matrix={json.dumps(matrix)}\n")
          print(json.dumps(matrix, indent=2))
          PY
      - uses: actions/upload-artifact@v6
        with:
          name: stage3-shard-definitions
          path: stage3_shards/

  run-stage3-shards:
    needs: prepare-stage3-shards
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(github.event.inputs.max_parallel || '3') }}
      matrix:
        include: ${{ fromJSON(needs.prepare-stage3-shards.outputs.shard_matrix) }}
    uses: ./.github/workflows/stage3-shard.yml
    with:
      shard_id: ${{ matrix.shard_id }}
    secrets: inherit

  aggregate-stage3:
    needs: run-stage3-shards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: mkdir -p data/processed
      - uses: actions/download-artifact@v6
        with:
          name: stage2-merged
          path: data/processed
      - uses: actions/download-artifact@v6
        with:
          path: downloaded_stage3
          pattern: stage3-*
          merge-multiple: false
      - name: Aggregate Stage 3 outputs
        run: |
          python scripts/aggregate_selected_results.py \
            --input-dir downloaded_stage3 \
            --output-dir data/processed \
            --file run_metrics_v16_stage3_enhanced.csv \
            --file run_steps_v16_stage3_breakdown.csv \
            --file run_per_style_v1_stage3.csv
          wc -l data/processed/run_metrics_v16_stage3_enhanced.csv || true
          wc -l data/processed/run_steps_v16_stage3_breakdown.csv || true
          wc -l data/processed/run_per_style_v1_stage3.csv || true
      - uses: actions/upload-artifact@v6
        with:
          name: stage3-merged
          path: |
            data/processed/verified_workflows_v16.csv
            data/processed/run_inventory.csv
            data/processed/run_inventory_per_style.csv
            data/processed/run_metrics_v16_stage3_enhanced.csv
            data/processed/run_steps_v16_stage3_breakdown.csv
            data/processed/run_per_style_v1_stage3.csv
            data/processed/aggregate_manifest.json

  stage4-and-build:
    needs: aggregate-stage3
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - run: mkdir -p data/processed
      - uses: actions/download-artifact@v6
        with:
          name: stage3-merged
          path: data/processed
      - name: Run Stage 4
        env:
          ROOT_DIR: ${{ github.workspace }}/data/processed
        run: |
          python -m pipeline.stage4_workload_signature
          wc -l data/processed/run_workload_signature_v3.csv || true
      - name: Build MainDataset
        env:
          ROOT_DIR: ${{ github.workspace }}/data/processed
        run: |
          python -m pipeline.build_total_dataset
          wc -l data/processed/MainDataset.csv || true
      - name: Commit final processed outputs
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            data/processed/verified_workflows_v16.csv \
            data/processed/run_inventory.csv \
            data/processed/run_inventory_per_style.csv \
            data/processed/run_metrics_v16_stage3_enhanced.csv \
            data/processed/run_steps_v16_stage3_breakdown.csv \
            data/processed/run_per_style_v1_stage3.csv \
            data/processed/run_workload_signature_v3.csv \
            data/processed/MainDataset.csv
          git diff --cached --quiet || git commit -m "Update stagewise sharded processed outputs"
          git push
      - uses: actions/upload-artifact@v6
        with:
          name: final-stagewise-results
          path: |
            data/processed/verified_workflows_v16.csv
            data/processed/run_inventory.csv
            data/processed/run_inventory_per_style.csv
            data/processed/run_metrics_v16_stage3_enhanced.csv
            data/processed/run_steps_v16_stage3_breakdown.csv
            data/processed/run_per_style_v1_stage3.csv
            data/processed/run_workload_signature_v3.csv
            data/processed/MainDataset.csv
