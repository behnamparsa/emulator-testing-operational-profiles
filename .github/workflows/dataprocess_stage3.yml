name: DataProcess Stage 3 - Telemetry + Per-Style + Steps

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  stage3:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Stage 2 output exists
        run: |
          test -f data/study_exports/run_inventory.csv

      - name: Prepare workdir + copy Stage 2 output
        run: |
          mkdir -p workdir
          cp data/study_exports/run_inventory.csv workdir/run_inventory.csv

      - name: Run Stage 3 (telemetry + per-style)
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ github.token }}
          ROOT_DIR: ${{ github.workspace }}/workdir
        run: |
          python -m pipeline.stage3_run_telemetry

      - name: Persist Stage 3 outputs into repo
        run: |
          mkdir -p data/study_exports
          cp workdir/run_metrics_v16_stage3_enhanced.csv data/study_exports/run_metrics_v16_stage3_enhanced.csv
          cp workdir/run_steps_v16_stage3_breakdown.csv data/study_exports/run_steps_v16_stage3_breakdown.csv
          cp workdir/run_per_style_v1_stage3.csv data/study_exports/run_per_style_v1_stage3.csv

      - name: Commit Stage 3 outputs
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/study_exports/run_metrics_v16_stage3_enhanced.csv \
                  data/study_exports/run_steps_v16_stage3_breakdown.csv \
                  data/study_exports/run_per_style_v1_stage3.csv
          git diff --cached --quiet || git commit -m "Stage 3: telemetry + steps + per-style CSVs"
          git push

      - name: Upload Stage 3 artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: stage3_outputs
          path: |
            data/study_exports/run_metrics_v16_stage3_enhanced.csv
            data/study_exports/run_steps_v16_stage3_breakdown.csv
            data/study_exports/run_per_style_v1_stage3.csv