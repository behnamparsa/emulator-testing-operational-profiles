name: Pipeline Manager Stage 1

on:
  workflow_dispatch:
    inputs:
      url_list_path:
        description: Path to URL list CSV
        required: false
        default: 'data/processed/URL_List.csv'
      chunk_size:
        description: URLs per Stage 1 shard
        required: false
        default: '10'
      max_parallel:
        description: Max parallel Stage 1 shards
        required: false
        default: '3'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: read

jobs:
  prepare-stage1-shards:
    runs-on: ubuntu-latest
    outputs:
      shard_matrix: ${{ steps.build.outputs.shard_matrix }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate URL list exists
        run: |
          test -f "${{ inputs.url_list_path }}"
          echo "Stage 1 input:"
          ls -l "${{ inputs.url_list_path }}"
          echo "Stage 1 input lines:"
          wc -l "${{ inputs.url_list_path }}" || true
          echo "Stage 1 input preview:"
          sed -n '1,10p' "${{ inputs.url_list_path }}" || true

      - name: Prepare Stage 1 shards
        run: |
          rm -rf data/processed/stage1_shards
          mkdir -p data/processed/stage1_shards
          python scripts/split_csv_rows.py \
            --input "${{ inputs.url_list_path }}" \
            --chunk-size "${{ inputs.chunk_size }}" \
            --out-dir data/processed/stage1_shards \
            --filename URL_List.csv

      - name: Show prepared Stage 1 shards
        run: |
          echo "Prepared shard files:"
          find data/processed/stage1_shards -maxdepth 2 -type f | sort || true

      - name: Upload Stage 1 shard definitions
        uses: actions/upload-artifact@v7
        with:
          name: stage1-definitions
          path: data/processed/stage1_shards

      - id: build
        name: Build Stage 1 shard matrix
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          root = Path("data/processed/stage1_shards")
          shard_dirs = sorted([p for p in root.iterdir() if p.is_dir()])

          matrix = {
              "include": [
                  {
                      "shard_id": p.name,
                      "shard_file": "URL_List.csv"
                  }
                  for p in shard_dirs
              ]
          }

          print("Stage 1 shard matrix:")
          print(json.dumps(matrix, indent=2))

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"shard_matrix={json.dumps(matrix)}\n")
          PY

  run-stage1-shards:
    needs: prepare-stage1-shards
    if: ${{ needs.prepare-stage1-shards.outputs.shard_matrix != '' && needs.prepare-stage1-shards.outputs.shard_matrix != '{"include":[]}' }}
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJson(inputs.max_parallel) }}
      matrix: ${{ fromJson(needs.prepare-stage1-shards.outputs.shard_matrix) }}

    uses: ./.github/workflows/stage1-shard.yml
    with:
      shard_id: ${{ matrix.shard_id }}
      shard_file: ${{ matrix.shard_file }}
    secrets: inherit

  aggregate-stage1:
    needs: run-stage1-shards
    if: ${{ needs.run-stage1-shards.result == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download Stage 1 shard outputs
        uses: actions/download-artifact@v8
        with:
          pattern: stage1-shard-*
          path: data/processed/stage1_shards_downloaded
          merge-multiple: false

      - name: Show downloaded Stage 1 shard outputs
        if: always()
        run: |
          echo "Downloaded directory tree:"
          find data/processed/stage1_shards_downloaded -maxdepth 4 -print || true

      - name: Fail clearly if no Stage 1 shard artifacts were downloaded
        run: |
          find data/processed/stage1_shards_downloaded -mindepth 1 -maxdepth 1 -type d | grep . >/dev/null

      - name: Aggregate Stage 1
        run: |
          rm -f data/processed/verified_workflows_v16.csv
          mkdir -p data/processed
          python scripts/aggregate_selected_results.py \
            --input-dir data/processed/stage1_shards_downloaded \
            --output-dir data/processed \
            --file verified_workflows_v16.csv

      - name: Inspect aggregated Stage 1 output
        if: always()
        run: |
          echo "Stage 1 merged rows:"
          wc -l data/processed/verified_workflows_v16.csv || true
          echo "Stage 1 merged preview:"
          sed -n '1,10p' data/processed/verified_workflows_v16.csv || true

      - name: Validate Stage 1 output exists
        run: |
          test -f data/processed/verified_workflows_v16.csv

      - name: Commit Stage 1 output
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed/verified_workflows_v16.csv
          git diff --cached --quiet || git commit -m "Stage 1 manager: verified_workflows_v16.csv"
          git push

      - name: Upload Stage 1 artifact
        uses: actions/upload-artifact@v7
        with:
          name: stage1_verified_workflows
          path: data/processed/verified_workflows_v16.csv