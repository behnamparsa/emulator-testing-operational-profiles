name: Pipeline Manager Build MainDataset

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-main-dataset:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare processed folder
        run: |
          mkdir -p data/processed

      - name: Validate merged inputs exist
        run: |
          test -f data/processed/run_inventory.csv
          test -f data/processed/run_inventory_per_style.csv
          test -f data/processed/run_metrics_v16_stage3_enhanced.csv
          test -f data/processed/run_steps_v16_stage3_breakdown.csv
          test -f data/processed/run_per_style_v1_stage3.csv
          test -f data/processed/run_workload_signature_v3.csv

      - name: Build MainDataset
        env:
          ROOT_DIR: ${{ github.workspace }}/data/processed
        run: |
          python -m pipeline.build_total_dataset

      - name: Inspect MainDataset output
        if: always()
        run: |
          echo "MainDataset rows:"
          wc -l data/processed/MainDataset.csv || true
          echo "MainDataset preview:"
          sed -n '1,10p' data/processed/MainDataset.csv || true

      - name: Validate MainDataset output exists
        run: |
          test -f data/processed/MainDataset.csv

      - name: Commit MainDataset output
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed/MainDataset.csv
          git diff --cached --quiet || git commit -m "Build manager: MainDataset.csv"
          git push

      - name: Upload MainDataset artifact
        uses: actions/upload-artifact@v7
        with:
          name: main-dataset
          path: data/processed/MainDataset.csv