name: Profile QA Catalog Bootstrap

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-processed-writer
  cancel-in-progress: false

jobs:
  bootstrap:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify source paper exists
        run: |
          ls -l data/Source_Paper
          test -f data/Source_Paper/Emulator_Testing_MSR_2026_Modified_RQ3B_Extension.pdf

      - name: Build observation QA catalog from paper
        run: |
          PYTHONPATH=. python scripts/run_profile_catalog_bootstrap.py

      - name: Commit catalog
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add outputs/catalog/observation_qa_catalog.csv

          if git diff --cached --quiet; then
            echo "No catalog changes to commit."
            exit 0
          fi

          git commit -m "Bootstrap observation QA catalog from source paper"

          pushed=0
          for i in 1 2 3; do
            echo "Push attempt ${i}"
            if git pull --rebase origin main && git push origin HEAD:main; then
              pushed=1
              break
            fi
            echo "Push attempt ${i} failed; retrying after 10s..."
            sleep 10
          done

          test "${pushed}" = "1"
