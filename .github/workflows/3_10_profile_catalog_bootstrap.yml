name: Profile QA Catalog Bootstrap
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - run: python scripts/run_profile_catalog_bootstrap.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/catalog/observation_qa_catalog.csv
          git diff --cached --quiet || git commit -m "Bootstrap observation QA catalog"
          git pull --rebase origin main || true
          git push origin HEAD:main || true
