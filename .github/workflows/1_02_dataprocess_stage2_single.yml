name: Stage 2 - Single-Run Run Inventory

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  stage2:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare processed folder
        run: |
          mkdir -p data/processed

      - name: Validate Stage 1 output exists
        run: |
          test -f data/processed/verified_workflows_v16.csv

      - name: Run Stage 2 (run inventory)
        env:
          GH_PAT_1: ${{ secrets.GH_PAT_1 }}
          GH_PAT_2: ${{ secrets.GH_PAT_2 }}
          GH_PAT_3: ${{ secrets.GH_PAT_3 }}
          GH_PAT_4: ${{ secrets.GH_PAT_4 }}
          GH_PAT_5: ${{ secrets.GH_PAT_5 }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ github.token }}
          ROOT_DIR: ${{ github.workspace }}/data/processed
        run: |
          python -m pipeline.stage2_run_inventory

      - name: Inspect Stage 2 outputs
        if: always()
        run: |
          echo "run_inventory.csv lines:"
          wc -l data/processed/run_inventory.csv || true
          echo "run_inventory_per_style.csv lines:"
          wc -l data/processed/run_inventory_per_style.csv || true
          echo "run_inventory.csv preview:"
          sed -n '1,10p' data/processed/run_inventory.csv || true
          echo "run_inventory_per_style.csv preview:"
          sed -n '1,10p' data/processed/run_inventory_per_style.csv || true


      - name: Validate Stage 2 outputs exist
        run: |
          test -f data/processed/run_inventory.csv
          test -f data/processed/run_inventory_per_style.csv

      - name: Commit Stage 2 output
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed/run_inventory.csv data/processed/run_inventory_per_style.csv
          git diff --cached --quiet || git commit -m "Stage 2: run_inventory.csv + run_inventory_per_style.csv"
          git push

      - name: Upload Stage 2 artifact
        uses: actions/upload-artifact@v7
        with:
          name: stage2_run_inventory
          path: |
            data/processed/run_inventory.csv
            data/processed/run_inventory_per_style.csv


