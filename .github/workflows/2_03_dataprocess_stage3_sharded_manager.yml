name: Stage 3 - Sharded Manager

on:
  workflow_dispatch:
    inputs:
      chunk_size:
        description: Per-style rows per Stage 3 shard
        required: false
        default: '10'
      max_parallel:
        description: Max parallel Stage 3 shards
        required: false
        default: '3'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: read

concurrency:
  group: data-processed-writer
  cancel-in-progress: false

jobs:
  prepare-stage3-shards:
    runs-on: ubuntu-latest
    outputs:
      shard_matrix: ${{ steps.build.outputs.shard_matrix }}
      shard_count: ${{ steps.build.outputs.shard_count }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Stage 3 inputs
        run: |
          test -f data/processed/run_inventory.csv
          test -f data/processed/run_inventory_per_style.csv
          echo "run_inventory lines:"
          wc -l data/processed/run_inventory.csv || true
          echo "run_inventory_per_style lines:"
          wc -l data/processed/run_inventory_per_style.csv || true
          echo "run_inventory preview:"
          sed -n '1,10p' data/processed/run_inventory.csv || true
          echo "run_inventory_per_style preview:"
          sed -n '1,10p' data/processed/run_inventory_per_style.csv || true

      - name: Filter Stage 3 driver rows to executed styles only
        run: |
          mkdir -p data/processed/stage3_inputs
          python - <<'PY'
          import csv
          from pathlib import Path

          src = Path('data/processed/run_inventory_per_style.csv')
          dst = Path('data/processed/stage3_inputs/run_inventory_per_style.executed_only.csv')

          with src.open('r', encoding='utf-8', errors='ignore', newline='') as f:
              reader = csv.DictReader(f)
              fieldnames = reader.fieldnames or []
              rows = [dict(r) for r in reader]

          if not fieldnames:
              raise RuntimeError('run_inventory_per_style.csv is missing headers')
          if 'style_instru_job_count' not in fieldnames:
              raise RuntimeError('run_inventory_per_style.csv is missing style_instru_job_count')

          def as_int(v):
              try:
                  return int(str(v).strip())
              except Exception:
                  return 0

          kept = [r for r in rows if as_int(r.get('style_instru_job_count')) > 0]

          with dst.open('w', encoding='utf-8', newline='') as f:
              writer = csv.DictWriter(f, fieldnames=fieldnames, extrasaction='ignore')
              writer.writeheader()
              for row in kept:
                  writer.writerow(row)

          print(f'total_rows={len(rows)}')
          print(f'kept_rows={len(kept)}')
          print(f'filtered_file={dst}')

          if not kept:
              raise RuntimeError(
                  'After filtering run_inventory_per_style.csv on style_instru_job_count > 0, '
                  'no Stage 3 executable rows remain.'
              )
          PY

      - name: Show filtered Stage 3 driver preview
        run: |
          echo "Filtered run_inventory_per_style lines:"
          wc -l data/processed/stage3_inputs/run_inventory_per_style.executed_only.csv || true
          echo "Filtered run_inventory_per_style preview:"
          sed -n '1,10p' data/processed/stage3_inputs/run_inventory_per_style.executed_only.csv || true

      - name: Prepare Stage 3 shards
        run: |
          rm -rf data/processed/stage3_shards
          mkdir -p data/processed/stage3_shards
          python scripts/prepare_stage3_shards.py             --run-inventory data/processed/run_inventory.csv             --run-per-style data/processed/stage3_inputs/run_inventory_per_style.executed_only.csv             --chunk-size "${{ inputs.chunk_size }}"             --out-dir data/processed/stage3_shards

      - name: Show prepared Stage 3 shards
        run: |
          echo "Prepared shard files:"
          find data/processed/stage3_shards -maxdepth 2 -type f | sort || true

      - name: Upload Stage 3 shard definitions
        uses: actions/upload-artifact@v7
        with:
          name: stage3-definitions
          path: data/processed/stage3_shards

      - id: build
        name: Build Stage 3 shard matrix
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          root = Path('data/processed/stage3_shards')
          shards = sorted([p.name for p in root.iterdir() if p.is_dir()])
          matrix = {'include': [{'shard_id': s} for s in shards]}

          print(matrix)

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as fh:
              fh.write(f"shard_matrix={json.dumps(matrix)}\n")
              fh.write(f"shard_count={len(shards)}\n")
          PY

  run-stage3-shards:
    needs: prepare-stage3-shards
    if: ${{ needs.prepare-stage3-shards.outputs.shard_matrix != '' && needs.prepare-stage3-shards.outputs.shard_matrix != '{"include":[]}' }}
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJson(inputs.max_parallel) }}
      matrix: ${{ fromJson(needs.prepare-stage3-shards.outputs.shard_matrix) }}

    uses: ./.github/workflows/2_03_dataprocess_stage3_shard_worker.yml
    with:
      shard_id: ${{ matrix.shard_id }}
    secrets: inherit

  aggregate-stage3:
    needs:
      - prepare-stage3-shards
      - run-stage3-shards
    if: ${{ needs.run-stage3-shards.result == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download Stage 3 shard outputs
        uses: actions/download-artifact@v8
        with:
          pattern: stage3-shard-*
          path: data/processed/stage3_shards_downloaded
          merge-multiple: false

      - name: Show downloaded Stage 3 shard outputs
        if: always()
        run: |
          echo "Downloaded directory tree:"
          find data/processed/stage3_shards_downloaded -maxdepth 5 -print || true

      - name: Validate Stage 3 shard downloads are complete
        env:
          EXPECTED_SHARDS: ${{ needs.prepare-stage3-shards.outputs.shard_count }}
        run: |
          test -d data/processed/stage3_shards_downloaded
          actual=$(find data/processed/stage3_shards_downloaded -mindepth 1 -maxdepth 1 -type d | wc -l | tr -d ' ')
          echo "Expected shard artifacts: ${EXPECTED_SHARDS}"
          echo "Actual downloaded shard artifact dirs: ${actual}"
          test "${actual}" = "${EXPECTED_SHARDS}"

          find data/processed/stage3_shards_downloaded -mindepth 1 -maxdepth 1 -type d | while read -r d; do
            test -f "$d/run_metrics_v16_stage3_enhanced.csv"
            test -f "$d/run_steps_v16_stage3_breakdown.csv"
            test -f "$d/run_per_style_v1_stage3.csv"
          done

      - name: Aggregate run_metrics_v16_stage3_enhanced.csv
        run: |
          rm -f data/processed/run_metrics_v16_stage3_enhanced.csv
          mkdir -p data/processed
          python scripts/aggregate_selected_results.py             --input-dir data/processed/stage3_shards_downloaded             --output-dir data/processed             --file run_metrics_v16_stage3_enhanced.csv

      - name: Inspect aggregated run_metrics
        if: always()
        run: |
          echo "run_metrics lines:"
          wc -l data/processed/run_metrics_v16_stage3_enhanced.csv || true
          echo "run_metrics preview:"
          sed -n '1,10p' data/processed/run_metrics_v16_stage3_enhanced.csv || true

      - name: Aggregate run_steps_v16_stage3_breakdown.csv
        run: |
          rm -f data/processed/run_steps_v16_stage3_breakdown.csv
          python scripts/aggregate_selected_results.py             --input-dir data/processed/stage3_shards_downloaded             --output-dir data/processed             --file run_steps_v16_stage3_breakdown.csv

      - name: Inspect aggregated run_steps
        if: always()
        run: |
          echo "run_steps lines:"
          wc -l data/processed/run_steps_v16_stage3_breakdown.csv || true
          echo "run_steps preview:"
          sed -n '1,10p' data/processed/run_steps_v16_stage3_breakdown.csv || true
          echo "run_steps size (bytes):"
          stat -c %s data/processed/run_steps_v16_stage3_breakdown.csv || true

      - name: Aggregate run_per_style_v1_stage3.csv
        run: |
          rm -f data/processed/run_per_style_v1_stage3.csv
          python scripts/aggregate_selected_results.py             --input-dir data/processed/stage3_shards_downloaded             --output-dir data/processed             --file run_per_style_v1_stage3.csv

      - name: Inspect aggregated run_per_style
        if: always()
        run: |
          echo "run_per_style lines:"
          wc -l data/processed/run_per_style_v1_stage3.csv || true
          echo "run_per_style preview:"
          sed -n '1,10p' data/processed/run_per_style_v1_stage3.csv || true

      - name: Validate Stage 3 outputs exist
        run: |
          test -f data/processed/run_metrics_v16_stage3_enhanced.csv
          test -f data/processed/run_steps_v16_stage3_breakdown.csv
          test -f data/processed/run_per_style_v1_stage3.csv

      - name: Commit Stage 3 summary outputs only
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed/run_metrics_v16_stage3_enhanced.csv                   data/processed/run_per_style_v1_stage3.csv

          if git diff --cached --quiet; then
            echo "No summary-output changes to commit."
            exit 0
          fi

          git commit -m "Stage 3 manager: telemetry summary outputs"

          for i in 1 2 3; do
            echo "Push attempt ${i}"
            git pull --rebase origin main && git push origin HEAD:main && break
            echo "Push attempt ${i} failed; retrying after 10s..."
            sleep 10
          done

      - name: Upload Stage 3 artifact
        uses: actions/upload-artifact@v7
        with:
          name: stage3
          path: |
            data/processed/run_metrics_v16_stage3_enhanced.csv
            data/processed/run_steps_v16_stage3_breakdown.csv
            data/processed/run_per_style_v1_stage3.csv
