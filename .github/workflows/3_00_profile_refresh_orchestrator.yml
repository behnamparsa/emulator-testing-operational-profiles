name: 000_2_Analytical_Pipeline_Main_Orchestrator

on:
  workflow_dispatch:
    inputs:
      snapshot_tag:
        description: Optional snapshot tag override
        required: false
        default: ""
      dispatch_token:
        description: Optional master-orchestrator token
        required: false
        default: ""

permissions:
  contents: write

jobs:
  layer1:
    uses: ./.github/workflows/3_11_layer1_observation_validation.yml
    with:
      snapshot_tag: ${{ inputs.snapshot_tag }}
    secrets: inherit

  regenerate:
    needs: layer1
    uses: ./.github/workflows/3_12_profile_rule_regeneration.yml
    secrets: inherit

  robustness_check:
    needs: regenerate
    uses: ./.github/workflows/3_13_robustness_check.yml
    secrets: inherit
