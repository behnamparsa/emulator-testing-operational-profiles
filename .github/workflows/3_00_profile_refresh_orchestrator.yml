name: 000_2_Analytical_Pipeline_Main_Orchestrator
run-name: >-
  000_2_Analytical_Pipeline_Main_Orchestrator${{
  inputs.dispatch_token && format(' [{0}]', inputs.dispatch_token) || '' }}

on:
  workflow_dispatch:
    inputs:
      snapshot_tag:
        description: Optional snapshot tag override
        required: false
        default: ''
        type: string
      dispatch_token:
        description: Optional unique token from the scheduled master orchestrator
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  layer1:
    uses: ./.github/workflows/3_11_layer1_observation_validation.yml
    with:
      snapshot_tag: ${{ inputs.snapshot_tag }}
    secrets: inherit

  regenerate:
    needs: layer1
    uses: ./.github/workflows/3_12_profile_rule_regeneration.yml
    secrets: inherit