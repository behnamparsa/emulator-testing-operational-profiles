name: Stage 3 - Shard Worker

on:
  workflow_call:
    inputs:
      shard_id:
        required: true
        type: string
      shard_root:
        required: false
        type: string
        default: data/processed/stage3_shards

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  run-shard:
    runs-on: ubuntu-latest
    timeout-minutes: 260

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download Stage 3 shard definitions
        uses: actions/download-artifact@v8
        with:
          name: stage3-definitions
          path: stage3-shard-definitions

      - name: Prepare Stage 3 shard root
        run: |
          test -f "stage3-shard-definitions/${{ inputs.shard_id }}/run_inventory.csv"
          test -f "stage3-shard-definitions/${{ inputs.shard_id }}/run_inventory_per_style.csv"
          rm -rf "${{ inputs.shard_root }}/${{ inputs.shard_id }}"
          mkdir -p "${{ inputs.shard_root }}/${{ inputs.shard_id }}"
          cp "stage3-shard-definitions/${{ inputs.shard_id }}/run_inventory.csv"              "${{ inputs.shard_root }}/${{ inputs.shard_id }}/run_inventory.csv"
          cp "stage3-shard-definitions/${{ inputs.shard_id }}/run_inventory_per_style.csv"              "${{ inputs.shard_root }}/${{ inputs.shard_id }}/run_inventory_per_style.csv"

      - name: Run Stage 3
        env:
          GH_PAT_1: ${{ secrets.GH_PAT_1 }}
          GH_PAT_2: ${{ secrets.GH_PAT_2 }}
          GH_PAT_3: ${{ secrets.GH_PAT_3 }}
          GH_PAT_4: ${{ secrets.GH_PAT_4 }}
          GH_PAT_5: ${{ secrets.GH_PAT_5 }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ github.token }}
          ROOT_DIR: ${{ github.workspace }}/${{ inputs.shard_root }}/${{ inputs.shard_id }}
        run: |
          python -m pipeline.stage3_run_telemetry

      - name: Gzip shard step-level output
        run: |
          test -f "${{ inputs.shard_root }}/${{ inputs.shard_id }}/run_steps_v16_stage3_breakdown.csv"
          python - <<'PY'
          import gzip, shutil
          from pathlib import Path
          src = Path("${{ inputs.shard_root }}/${{ inputs.shard_id }}/run_steps_v16_stage3_breakdown.csv")
          dst = src.with_suffix(src.suffix + '.gz')
          with src.open('rb') as f_in, gzip.open(dst, 'wb', compresslevel=6) as f_out:
              shutil.copyfileobj(f_in, f_out)
          src.unlink()
          print(dst)
          PY

      - name: Validate Stage 3 outputs exist
        run: |
          test -f "${{ inputs.shard_root }}/${{ inputs.shard_id }}/run_metrics_v16_stage3_enhanced.csv"
          test -f "${{ inputs.shard_root }}/${{ inputs.shard_id }}/run_steps_v16_stage3_breakdown.csv.gz"
          test -f "${{ inputs.shard_root }}/${{ inputs.shard_id }}/run_per_style_v1_stage3.csv"

      - name: Upload Stage 3 shard outputs
        uses: actions/upload-artifact@v7
        with:
          name: stage3-shard-${{ inputs.shard_id }}
          path: |
            ${{ inputs.shard_root }}/${{ inputs.shard_id }}/run_metrics_v16_stage3_enhanced.csv
            ${{ inputs.shard_root }}/${{ inputs.shard_id }}/run_steps_v16_stage3_breakdown.csv.gz
            ${{ inputs.shard_root }}/${{ inputs.shard_id }}/run_per_style_v1_stage3.csv
          if-no-files-found: error
