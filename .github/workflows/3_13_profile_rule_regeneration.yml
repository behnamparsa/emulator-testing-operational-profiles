name: Profile and Rule Regeneration
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - run: python scripts/run_profile_regeneration.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/profiles/operational_profile.md outputs/profiles/operational_profile.json outputs/rules/decision_support_rules.md outputs/rules/decision_support_rules.json outputs/reports/latest_refresh_report.md
          git diff --cached --quiet || git commit -m "Regenerate profile and rules"
          git pull --rebase origin main || true
          git push origin HEAD:main || true
