name: Analyze latest dataset and generate Section V outputs

on:
  workflow_dispatch:
  # Optionally run automatically after dataset refresh finishes:
  # workflow_run:
  #   workflows: ["Refresh (split stages) dataset only"]
  #   types: [completed]

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Confirm dataset exists
        run: |
          test -f data/processed/MainDataset.csv

      - name: Run analysis + Section V generator
        run: |
          python scripts/run_analysis.py
          python scripts/run_section_v.py

      - name: Commit updated profiles/rules
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs
          git diff --cached --quiet || git commit -m "Update operational profile and decision rules"
          git push