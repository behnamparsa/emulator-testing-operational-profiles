name: Stage 1 Shard

on:
  workflow_call:
    inputs:
      shard_id:
        required: true
        type: string
      shard_file:
        required: false
        type: string
        default: URL_List.csv
      shard_root:
        required: false
        type: string
        default: data/processed/stage1_shards

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  run-shard:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download Stage 1 shard definitions
        uses: actions/download-artifact@v8
        with:
          name: stage1-definitions
          path: stage1-shard-definitions

      - name: Prepare Stage 1 shard root
        run: |
          rm -rf "${{ inputs.shard_root }}/${{ inputs.shard_id }}"
          mkdir -p "${{ inputs.shard_root }}/${{ inputs.shard_id }}"
          cp "stage1-shard-definitions/${{ inputs.shard_id }}/${{ inputs.shard_file }}" \
             "${{ inputs.shard_root }}/${{ inputs.shard_id }}/URL_List.csv"

          echo "Stage 1 shard input lines:"
          wc -l "${{ inputs.shard_root }}/${{ inputs.shard_id }}/URL_List.csv" || true
          echo "Stage 1 shard input preview:"
          sed -n '1,10p' "${{ inputs.shard_root }}/${{ inputs.shard_id }}/URL_List.csv" || true

      - name: Run Stage 1 (verified workflows)
        env:
          GH_PAT_1: ${{ secrets.GH_PAT_1 }}
          GH_PAT_2: ${{ secrets.GH_PAT_2 }}
          GH_PAT_3: ${{ secrets.GH_PAT_3 }}
          GH_PAT_4: ${{ secrets.GH_PAT_4 }}
          GH_PAT_5: ${{ secrets.GH_PAT_5 }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ github.token }}
          ROOT_DIR: ${{ github.workspace }}/${{ inputs.shard_root }}/${{ inputs.shard_id }}
        run: |
          python -m pipeline.stage1_verified_workflows

      - name: Inspect Stage 1 output
        if: always()
        run: |
          echo "Stage 1 output lines:"
          wc -l "${{ inputs.shard_root }}/${{ inputs.shard_id }}/verified_workflows_v16.csv" || true
          echo "Stage 1 output preview:"
          sed -n '1,10p' "${{ inputs.shard_root }}/${{ inputs.shard_id }}/verified_workflows_v16.csv" || true

      - name: Debug shard folder before upload
        if: always()
        run: |
          echo "Shard folder contents:"
          find "${{ inputs.shard_root }}/${{ inputs.shard_id }}" -maxdepth 3 -print || true

      - name: Validate Stage 1 output exists
        run: |
          test -f "${{ inputs.shard_root }}/${{ inputs.shard_id }}/verified_workflows_v16.csv"

      - name: Upload Stage 1 shard output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: stage1-shard-${{ inputs.shard_id }}
          path: |
            ${{ inputs.shard_root }}/${{ inputs.shard_id }}/verified_workflows_v16.csv
          if-no-files-found: warn