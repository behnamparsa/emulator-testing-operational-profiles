name: Stage 1 Shard

on:
  workflow_call:
    inputs:
      shard_id:
        required: true
        type: string
      shard_root:
        required: false
        type: string
        default: data/processed/stage1_shards

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  run-shard:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download stage 1 shard definitions
        uses: actions/download-artifact@v6
        with:
          name: stage1-shard-definitions
          path: stage1-shard-definitions

      - name: Prepare stage 1 shard root
        run: |
          mkdir -p "${{ inputs.shard_root }}/${{ inputs.shard_id }}"
          cp "stage1-shard-definitions/${{ inputs.shard_id }}/URL_List.csv" "${{ inputs.shard_root }}/${{ inputs.shard_id }}/URL_List.csv"
          echo "Stage 1 shard input lines:"
          wc -l "${{ inputs.shard_root }}/${{ inputs.shard_id }}/URL_List.csv" || true

      - name: Run Stage 1
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_PAT_1: ${{ secrets.GH_PAT_1 }}
          GH_PAT_2: ${{ secrets.GH_PAT_2 }}
          GH_PAT_3: ${{ secrets.GH_PAT_3 }}
          GH_PAT_4: ${{ secrets.GH_PAT_4 }}
          GH_PAT_5: ${{ secrets.GH_PAT_5 }}
          ROOT_DIR: ${{ github.workspace }}/${{ inputs.shard_root }}/${{ inputs.shard_id }}
        run: python -m pipeline.stage1_verified_workflows

      - name: Check Stage 1 output
        if: always()
        run: |
          echo "Stage 1 output lines:"
          wc -l "${{ inputs.shard_root }}/${{ inputs.shard_id }}/verified_workflows_v16.csv" || true
          sed -n '1,10p' "${{ inputs.shard_root }}/${{ inputs.shard_id }}/verified_workflows_v16.csv" || true

      - name: Upload Stage 1 shard output
        uses: actions/upload-artifact@v6
        with:
          name: stage1-${{ inputs.shard_id }}
          path: |
            ${{ inputs.shard_root }}/${{ inputs.shard_id }}/verified_workflows_v16.csv
