name: Refresh (split stages) dataset only

on:
  workflow_dispatch:
  # Enable after first successful manual run
  # schedule:
  #   - cron: '0 9 * * 1'  # Monday 09:00 UTC

permissions:
  contents: write

jobs:
  stage1:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare workdir + copy URL list
        run: |
          mkdir -p workdir
          cp data/processed/URL_List.csv workdir/URL_List.csv

      - name: Run Stage 1 (verified workflows)
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ github.token }}
          ROOT_DIR: ${{ github.workspace }}/workdir
        run: |
          python -m pipeline.stage1_verified_workflows

      - name: Upload Stage 1 outputs
        uses: actions/upload-artifact@v4
        with:
          name: stage1
          path: workdir/verified_workflows_v16.csv

  stage2:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    needs: stage1
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare workdir
        run: |
          mkdir -p workdir

      - name: Download Stage 1 outputs
        uses: actions/download-artifact@v4
        with:
          name: stage1
          path: workdir

      - name: Run Stage 2 (run inventory)
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ github.token }}
          ROOT_DIR: ${{ github.workspace }}/workdir
        run: |
          python -m pipeline.stage2_run_inventory

      - name: Upload Stage 2 outputs
        uses: actions/upload-artifact@v4
        with:
          name: stage2
          path: workdir/run_inventory.csv

  stage3:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    needs: stage2
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare workdir
        run: |
          mkdir -p workdir

      - name: Download Stage 2 outputs
        uses: actions/download-artifact@v4
        with:
          name: stage2
          path: workdir

      - name: Run Stage 3 (telemetry + per-style)
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ github.token }}
          ROOT_DIR: ${{ github.workspace }}/workdir
        run: |
          python -m pipeline.stage3_run_telemetry

      - name: Upload Stage 3 outputs
        uses: actions/upload-artifact@v4
        with:
          name: stage3
          path: |
            workdir/run_metrics_v16_stage3_enhanced.csv
            workdir/run_steps_v16_stage3_breakdown.csv
            workdir/run_per_style_v1_stage3.csv

  stage4_build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    needs: stage3
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare workdir
        run: |
          mkdir -p workdir

      - name: Download Stage 3 outputs
        uses: actions/download-artifact@v4
        with:
          name: stage3
          path: workdir

      - name: Run Stage 4 + build dataset
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ github.token }}
          ROOT_DIR: ${{ github.workspace }}/workdir
        run: |
          python -m pipeline.stage4_workload_signature
          python -m pipeline.build_total_dataset

      - name: Copy dataset into repo path
        run: |
          mkdir -p data/processed
          cp workdir/MainDataset.csv data/processed/MainDataset.csv

      - name: Commit updated dataset
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed/MainDataset.csv
          git diff --cached --quiet || git commit -m "Update dataset snapshot"
          git push

      - name: Upload dataset artifact
        uses: actions/upload-artifact@v4
        with:
          name: dataset
          path: workdir/MainDataset.csv