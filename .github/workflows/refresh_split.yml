name: dataprocess-refresh-split

on:
  workflow_dispatch:
  # Enable after first successful manual run
  # schedule:
  #   - cron: '0 9 * * 1'  # Monday 09:00 UTC

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  stage1:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare processed folder
        run: |
          mkdir -p data/processed

      - name: Validate URL list exists
        run: |
          test -f data/processed/URL_List.csv

      - name: Run Stage 1 (verified workflows)
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ github.token }}
          ROOT_DIR: ${{ github.workspace }}/data/processed
        run: |
          python -m pipeline.stage1_verified_workflows

      - name: Validate Stage 1 output exists
        run: |
          test -f data/processed/verified_workflows_v16.csv

      - name: Upload Stage 1 outputs
        uses: actions/upload-artifact@v6
        with:
          name: stage1
          path: data/processed/verified_workflows_v16.csv

  stage2:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    needs: stage1
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare processed folder
        run: |
          mkdir -p data/processed

      - name: Download Stage 1 outputs
        uses: actions/download-artifact@v6
        with:
          name: stage1
          path: data/processed

      - name: Validate Stage 1 output exists
        run: |
          test -f data/processed/verified_workflows_v16.csv

      - name: Run Stage 2 (run inventory)
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ github.token }}
          ROOT_DIR: ${{ github.workspace }}/data/processed
        run: |
          python -m pipeline.stage2_run_inventory

      - name: Validate Stage 2 output exists
        run: |
          test -f data/processed/run_inventory.csv

      - name: Upload Stage 2 outputs
        uses: actions/upload-artifact@v6
        with:
          name: stage2
          path: data/processed/run_inventory.csv

  stage3:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    needs: stage2
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare processed folder
        run: |
          mkdir -p data/processed

      - name: Download Stage 2 outputs
        uses: actions/download-artifact@v6
        with:
          name: stage2
          path: data/processed

      - name: Validate Stage 2 output exists
        run: |
          test -f data/processed/run_inventory.csv

      - name: Run Stage 3 (telemetry + per-style)
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ github.token }}
          ROOT_DIR: ${{ github.workspace }}/data/processed
        run: |
          python -m pipeline.stage3_run_telemetry

      - name: Validate Stage 3 outputs exist
        run: |
          test -f data/processed/run_metrics_v16_stage3_enhanced.csv
          test -f data/processed/run_steps_v16_stage3_breakdown.csv
          test -f data/processed/run_per_style_v1_stage3.csv

      - name: Upload Stage 3 outputs
        uses: actions/upload-artifact@v6
        with:
          name: stage3
          path: |
            data/processed/run_metrics_v16_stage3_enhanced.csv
            data/processed/run_steps_v16_stage3_breakdown.csv
            data/processed/run_per_style_v1_stage3.csv

  stage4_build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    needs: stage3
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare processed folder
        run: |
          mkdir -p data/processed

      - name: Download Stage 3 outputs
        uses: actions/download-artifact@v6
        with:
          name: stage3
          path: data/processed

      - name: Validate Stage 3 outputs exist
        run: |
          test -f data/processed/run_metrics_v16_stage3_enhanced.csv
          test -f data/processed/run_steps_v16_stage3_breakdown.csv
          test -f data/processed/run_per_style_v1_stage3.csv

      - name: Run Stage 4 + build dataset
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ github.token }}
          ROOT_DIR: ${{ github.workspace }}/data/processed
        run: |
          python -m pipeline.stage4_workload_signature
          python -m pipeline.build_total_dataset

      - name: Validate final outputs exist
        run: |
          test -f data/processed/run_workload_signature_v3.csv
          test -f data/processed/MainDataset.csv

      - name: Commit updated processed outputs
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            data/processed/verified_workflows_v16.csv \
            data/processed/run_inventory.csv \
            data/processed/run_metrics_v16_stage3_enhanced.csv \
            data/processed/run_steps_v16_stage3_breakdown.csv \
            data/processed/run_per_style_v1_stage3.csv \
            data/processed/run_workload_signature_v3.csv \
            data/processed/MainDataset.csv
          git diff --cached --quiet || git commit -m "Update processed pipeline outputs"
          git push

      - name: Upload dataset artifact bundle
        uses: actions/upload-artifact@v6
        with:
          name: all_csv
          path: |
            data/processed/verified_workflows_v16.csv
            data/processed/run_inventory.csv
            data/processed/run_metrics_v16_stage3_enhanced.csv
            data/processed/run_steps_v16_stage3_breakdown.csv
            data/processed/run_per_style_v1_stage3.csv
            data/processed/run_workload_signature_v3.csv
            data/processed/MainDataset.csv